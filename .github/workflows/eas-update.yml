name: Deploy EAS Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS Update Channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

# Prevents multiple concurrent updates from overriding each other
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish Update
        working-directory: apps/client
        run: eas update --auto --channel ${{ github.event.inputs.channel }}
